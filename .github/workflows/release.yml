name: Release

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'docs/**'

  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no actual release)'
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Semantic release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm

      - name: Install project dependencies
        run: npm ci

      - name: Install release tooling
        run: |
          npm install --no-save \
            semantic-release@^23.0.0 \
            @semantic-release/changelog@^6.0.3 \
            @semantic-release/git@^10.0.1 \
            @semantic-release/github@^9.2.6 \
            conventional-changelog-conventionalcommits@^7.0.2

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release ${{ github.event.inputs.dry_run && '--dry-run' || '' }}

      - name: Summary
        if: success()
        run: |
          echo "## Release process complete 🎉" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Semantic Release telah memproses commit dan membuat release jika ada perubahan signifikan." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Cek [Releases](../../releases) untuk melihat hasil." >> $GITHUB_STEP_SUMMARY
